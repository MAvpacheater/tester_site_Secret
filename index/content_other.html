<!-- Help Page -->
<div id="helpPage" class="page help-page">
    <div class="help-header">
        <h1 class="help-title">🆘 Help & Support</h1>
        <p class="help-subtitle">Need assistance? Contact our team!</p>
    </div>

    <!-- Admin Contact Section -->
    <div class="admin-contact-section">
        <div class="admin-card">
            <div class="admin-info">
                <div class="admin-avatar">👨‍💻</div>
                <div class="admin-details">
                    <div class="admin-name">Mr dep Dodep</div>
                    <div class="admin-role">Project Creator & Developer</div>
                    <div class="admin-status">🟢 Active</div>
                </div>
            </div>
            <div class="admin-contact">
                <button class="contact-btn telegram-btn" onclick="openAdminTelegram()">
                    📱 Contact on Telegram
                </button>
                <button class="contact-btn discord-btn" onclick="openAdminDiscord()">
                    🎮 Contact on Discord
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Peoples Page -->
<div id="peoplesPage" class="page peoples-page">
    <div class="peoples-header">
        <h1 class="peoples-title">🙏 Peoples & Developer</h1>
        <p class="peoples-subtitle">Special thanks to everyone who contributed!</p>
    </div>

    <!-- Filter Controls (will be dynamically inserted here by JavaScript) -->

    <!-- Contributors List -->
    <div class="contributors-list">
        <!-- Contributors will be dynamically loaded here -->
        <div class="contributor-card">
            <div style="text-align: center; color: #666; padding: 40px;">
                <div style="font-size: 2em; margin-bottom: 15px;">⏳</div>
                <div>Loading contributors...</div>
            </div>
        </div>
    </div>
</div>

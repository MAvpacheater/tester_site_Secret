<!-- Peoples Page -->
<div id="peoplesPage" class="page peoples-page">
    <div class="peoples-header">
        <h1 class="peoples-title">🙏 Peoples & Developer</h1>
        <p class="peoples-subtitle">Special thanks to everyone who contributed!</p>
        <p class="peoples-description">
            This project wouldn't be possible without the amazing community support, 
            bug reports, suggestions, and contributions from these wonderful people.
        </p>
    </div>

    <!-- Filter Controls (will be dynamically inserted here by JavaScript) -->

    <!-- Optional Statistics Section (hidden by default) -->
    <div class="peoples-stats" style="display: none;">
        <div class="stat-item">
            <div class="stat-number" id="totalContributors">0</div>
            <div class="stat-label">Contributors</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalAdmins">0</div>
            <div class="stat-label">Admins</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalHelpers">0</div>
            <div class="stat-label">Helpers</div>
        </div>
    </div>

    <!-- Contributors List -->
    <div class="contributors-list">
        <!-- Contributors will be dynamically loaded here -->
        <div class="contributor-card">
            <div style="text-align: center; color: #666; padding: 40px;">
                <div style="font-size: 2em; margin-bottom: 15px;">⏳</div>
                <div>Loading contributors...</div>
            </div>
        </div>
    </div>
</div>

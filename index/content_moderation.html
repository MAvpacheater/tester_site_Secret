<!-- Settings Page Content -->
<div class="page settings-page" id="settingsPage">
    <div class="settings-header">
        <h1 class="settings-title">⚙️ Settings</h1>
    </div>
    
    <div class="settings-groups">
        <!-- Background Settings -->
        <div class="settings-group" data-group="background">
            <div class="settings-group-header" onclick="toggleSettingsGroup('background')">
                <h2 class="settings-group-title">
                    <span class="settings-group-icon">🎨</span>
                    <span>Background</span>
                </h2>
                <span class="settings-group-toggle">▼</span>
            </div>
            <div class="settings-group-content">
                <p class="settings-group-description">Customize your app's visual theme</p>
                
                <div class="background-options">
                    <div class="background-option bg-penguin active" 
                         data-background="penguin" 
                         onclick="selectBackground('penguin')">
                        <div class="background-preview"></div>
                        <div class="background-info">
                            <div class="background-name">Penguin Theme</div>
                            <div class="background-description">Default mining theme</div>
                        </div>
                    </div>
                    
                    <div class="background-option bg-game" 
                         data-background="game" 
                         onclick="selectBackground('game')">
                        <div class="background-preview"></div>
                        <div class="background-info">
                            <div class="background-name">Gaming Theme</div>
                            <div class="background-description">Blue gradient theme</div>
                        </div>
                    </div>
                    
                    <div class="background-option bg-code" 
                         data-background="code" 
                         onclick="selectBackground('code')">
                        <div class="background-preview"></div>
                        <div class="background-info">
                            <div class="background-name">Code Theme</div>
                            <div class="background-description">Green matrix theme</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Menu Settings -->
        <div class="settings-group" data-group="menu">
            <div class="settings-group-header" onclick="toggleSettingsGroup('menu')">
                <h2 class="settings-group-title">
                    <span class="settings-group-icon">🧭</span>
                    <span>Menu</span>
                </h2>
                <span class="settings-group-toggle">▼</span>
            </div>
            <div class="settings-group-content">
                <p class="settings-group-description">Configure navigation preferences</p>
                
                <div class="coming-soon">
                    <div class="coming-soon-icon">🔄</div>
                    <div class="coming-soon-text">Coming Soon!</div>
                    <div class="coming-soon-description">Menu options will be available here</div>
                </div>
            </div>
        </div>
    </div>
</div>

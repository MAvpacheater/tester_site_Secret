<!-- Potions & Food Page with Rarity Filters -->
<div class="page potions-page" id="potionsPage">
    <h1 class="title">🧪 Potions & Food</h1>
    
    <!-- Main Container with Filters and Content -->
    <div class="potions-container" id="potionsContainer">
        <!-- Type Switcher will be inserted here by JavaScript -->
        
        <!-- Rarity Filter Controls will be inserted here by JavaScript -->
        
        <!-- Content Sections will be inserted here by JavaScript -->
        
        <!-- Loading State -->
        <div class="potions-loading" id="potionsLoading">
            <div style="text-align: center; color: #666; padding: 40px;">
                <div style="font-size: 2em; margin-bottom: 15px;">🧪</div>
                <div>Loading potions & food with rarity filters...</div>
            </div>
        </div>
    </div>
</div>

<!-- Script to auto-initialize when page becomes visible -->
<script>
// Auto-initialize potions when this page becomes active
document.addEventListener('DOMContentLoaded', function() {
    // Check if potions page is visible and initialize
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                const potionsPage = document.getElementById('potionsPage');
                if (potionsPage && potionsPage.classList.contains('active')) {
                    // Page is now active, initialize if not already done
                    setTimeout(() => {
                        if (typeof window.initializePotions === 'function' && 
                            !window.potionsInitialized) {
                            console.log('🧪 Auto-initializing potions on page activation...');
                            window.initializePotions();
                        }
                    }, 100);
                }
            }
        });
    });
    
    const potionsPage = document.getElementById('potionsPage');
    if (potionsPage) {
        observer.observe(potionsPage, { 
            attributes: true, 
            attributeFilter: ['class'] 
        });
    }
    
    // Also try immediate initialization if page is already active
    setTimeout(() => {
        if (potionsPage && potionsPage.classList.contains('active')) {
            if (typeof window.initializePotions === 'function' && 
                !window.potionsInitialized) {
                console.log('🧪 Immediate initialization of potions...');
                window.initializePotions();
            }
        }
    }, 200);
});

// Additional initialization trigger for navigation events
document.addEventListener('click', function(e) {
    // Check if clicking on potions navigation
    if (e.target && 
        (e.target.getAttribute('data-page') === 'potions' || 
         e.target.textContent?.includes('Potions') ||
         e.target.closest('[data-page="potions"]'))) {
        
        setTimeout(() => {
            const potionsPage = document.getElementById('potionsPage');
            if (potionsPage && potionsPage.classList.contains('active')) {
                if (typeof window.initializePotions === 'function') {
                    console.log('🧪 Navigation-triggered potions initialization...');
                    window.initializePotions();
                }
            }
        }, 300);
    }
});
</script>

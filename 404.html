<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... - Arm Helper</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .redirect-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .loading-icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .redirect-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .redirect-subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            width: 0%;
            animation: fillProgress 2s ease-out forwards;
        }
        
        @keyframes fillProgress {
            from { width: 0%; }
            to { width: 100%; }
        }
        
        .tech-info {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="loading-icon">🚀</div>
        <div class="redirect-title">Redirecting to <span id="pageName">Arm Helper</span></div>
        <div class="redirect-subtitle">
            <span id="currentPath"></span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="tech-info">
            Loading...
        </div>
    </div>

    <script>
        // Page name mappings
        var pageNames = {
            '/shiny_list': 'Shiny Stats',
            '/arm_calculator': 'Arm Calculator',
            '/grind_calculator': 'Grind Calculator',
            '/boosts_info': 'Boosts Info',
            '/secret_pets': 'Secret Pets',
            '/codes_list': 'Codes List',
            '/aura_info': 'Aura Info',
            '/trainer_info': 'Trainer Info',
            '/charms_info': 'Charms Info',
            '/potions_food': 'Potions & Food',
            '/worlds_info': 'Worlds Info',
            '/settings': 'Settings',
            '/help_guide': 'Help Guide',
            '/peoples_thanks': 'Thanks & Credits'
        };
        
        // Display current path and determine page name
        var currentPath = window.location.pathname;
        var pathParts = currentPath.split('/').filter(part => part);
        var pageName = 'Arm Helper';
        
        // Extract page path for display
        var displayPath = currentPath;
        if (pathParts.length > 1) {
            var relativePath = '/' + pathParts.slice(1).join('/');
            displayPath = relativePath;
            pageName = pageNames[relativePath] || 'Arm Helper';
        } else if (pathParts.length === 1) {
            var singlePath = '/' + pathParts[0];
            displayPath = singlePath;
            pageName = pageNames[singlePath] || 'Arm Helper';
        }
        
        document.getElementById('currentPath').textContent = displayPath;
        document.getElementById('pageName').textContent = pageName;
        
        console.log('🔄 404 Redirect triggered for:', currentPath);
        
        // Store the original path for restoration (keep the relative path)
        // For URLs like /tester_site_Secret/shiny_list, we want to store /shiny_list
        var pathToStore = currentPath;
        var search = window.location.search;
        var hash = window.location.hash;
        
        // If this is a repository-based URL, extract the relative path
        if (window.location.host.includes('.github.io') && pathParts.length > 1) {
            var potentialRepo = pathParts[0];
            if (potentialRepo === 'tester_site_Secret' || 
                potentialRepo.includes('_') || 
                potentialRepo.includes('-')) {
                // Remove the repository name from the path
                pathToStore = '/' + pathParts.slice(1).join('/');
            }
        }
        
        var fullOriginalURL = pathToStore + search + hash;
        sessionStorage.setItem('pathToRestore', fullOriginalURL);
        
        console.log('💾 Stored path for restoration:', fullOriginalURL);
        
        // Build the correct base URL for GitHub Pages
        var protocol = window.location.protocol;
        var host = window.location.host;
        
        var baseURL;
        if (host.includes('.github.io')) {
            // For GitHub Pages, we need to detect if this is repository-based
            if (pathParts.length > 0) {
                var potentialRepo = pathParts[0];
                
                // Check if this looks like a repository name
                // Repository names often contain underscores, hyphens, or are known names
                if (potentialRepo === 'tester_site_Secret' || 
                    potentialRepo.includes('_') || 
                    potentialRepo.includes('-') ||
                    // Add other repository detection logic if needed
                    host === 'mavpacheater.github.io') {
                    
                    baseURL = protocol + '//' + host + '/' + potentialRepo + '/';
                    console.log('🎯 Detected repository-based GitHub Pages:', baseURL);
                } else {
                    // Fallback to root
                    baseURL = protocol + '//' + host + '/';
                    console.log('🏠 Using root GitHub Pages:', baseURL);
                }
            } else {
                // No path parts, use root
                baseURL = protocol + '//' + host + '/';
                console.log('🏠 Using root GitHub Pages (no path):', baseURL);
            }
        } else {
            // For other platforms
            baseURL = protocol + '//' + host + '/';
            console.log('🌐 Using standard hosting:', baseURL);
        }
        
        console.log('🔄 Final redirect URL:', baseURL);
        
        // Use replace to avoid infinite loops
        setTimeout(function() {
            window.location.replace(baseURL);
        }, 1500);
    </script>
</body>
</html>

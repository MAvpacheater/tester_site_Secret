<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arm Helper</title>
    
    <!-- SPA Redirect Handler for GitHub Pages -->
    <script>
        // Handle paths redirected from 404.html
        (function() {
            var pathToRestore = sessionStorage.getItem('pathToRestore');
            
            if (pathToRestore) {
                console.log('🔄 SPA: Found path to restore:', pathToRestore);
                
                // Clean up
                sessionStorage.removeItem('pathToRestore');
                
                // Only restore if it's different from current path
                if (pathToRestore !== window.location.pathname) {
                    console.log('🔄 SPA: Restoring path from:', window.location.pathname, 'to:', pathToRestore);
                    history.replaceState(null, null, pathToRestore);
                    
                    // Flag for later processing
                    sessionStorage.setItem('spa_needs_routing', 'true');
                }
            }
            
            // Also handle legacy redirect parameter for backward compatibility
            var urlParams = new URLSearchParams(window.location.search);
            var redirectParam = urlParams.get('redirect');
            if (redirectParam) {
                console.log('🔄 SPA: Processing legacy redirect parameter:', redirectParam);
                
                // Clean URL from parameters
                var cleanURL = window.location.protocol + '//' + window.location.host + window.location.pathname;
                history.replaceState(null, null, redirectParam);
                sessionStorage.setItem('spa_needs_routing', 'true');
            }
        })();
    </script>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="general.css" as="style">
    <link rel="preload" href="general.js" as="script">
    
    <!-- Critical CSS - load immediately -->
    <link rel="stylesheet" href="general.css">
    
    <!-- Non-critical CSS - load deferred -->
    <link rel="stylesheet" href="calc/calculator.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="calc/arms.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="calc/grind.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/boosts.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/shiny.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/secret.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/codes.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/aura.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/trainer.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/charms.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/potions.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/worlds.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="moderation/settings.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="other/peoples.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="other/help.css" media="print" onload="this.media='all'">
</head>
<body>
    <!-- Loading screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-icon">🚀</div>
            <div>Loading Arm Helper...</div>
            <div class="loading-subtitle">Initializing...</div>
        </div>
    </div>

    <!-- Auto-reload indicator -->
    <div class="auto-reload-indicator" id="autoReloadIndicator">
        🔄 GitHub Auto-reload active
    </div>

    <!-- App content container -->
    <div id="app-content"></div>
    
    <!-- Signature -->
    <div class="signature">Your ideas on @privatefanat_dep (telegram)</div>
    
    <!-- Critical JavaScript - load immediately -->
    <script src="general.js"></script>
    <script src="system/reload.js"></script>
    <script src="system/url.js"></script>
    
    <!-- Non-critical JavaScript - load deferred -->
    <script>
        // Deferred script loading function
        function loadScriptsDeferred() {
            const scripts = [
                // Calculator modules
                'calc/calculator.js',
                'calc/arm.js', 
                'calc/grind.js',
                
                // Info modules
                'info/boosts.js',
                'info/shiny.js',
                'info/secret.js',
                'info/codes.js',
                'info/aura.js',
                'info/trainer.js',
                'info/charms.js',
                'info/potions.js',
                'info/worlds.js',
                
                // Moderation modules
                'moderation/settings.js',
                
                // Other modules
                'other/peoples.js',
                'other/help.js'
            ];
            
            let loadedCount = 0;
            const totalScripts = scripts.length;
            
            scripts.forEach(src => {
                const script = document.createElement('script');
                script.src = src;
                script.defer = true;
                script.onload = () => {
                    loadedCount++;
                    if (loadedCount === totalScripts) {
                        // All scripts loaded, now load content
                        const contentScript = document.createElement('script');
                        contentScript.src = 'index/content_loader.js';
                        contentScript.onload = () => {
                            updateLoadingText('Ready!');
                            
                            // ⭐ Initialize systems after everything is loaded
                            setTimeout(() => {
                                console.log('🚀 Initializing systems...');
                                
                                // Initialize URL routing first
                                if (typeof initURLRouting === 'function') {
                                    initURLRouting();
                                    console.log('✅ URL routing initialized');
                                }
                                
                                // Then initialize GitHub auto-reload
                                if (typeof initGitHubAutoReload === 'function') {
                                    const githubConfig = {
                                        githubUser: 'MAvpacheater',
                                        githubRepo: 'tester_site_Secret',
                                        branch: 'main',
                                        checkInterval: 30000
                                    };
                                    initGitHubAutoReload(githubConfig);
                                    console.log('✅ GitHub auto-reload initialized');
                                } else {
                                    console.warn('⚠️ GitHub auto-reload system not available');
                                }
                                
                                // Check if we need to handle SPA routing
                                const needsRouting = sessionStorage.getItem('spa_needs_routing');
                                if (needsRouting) {
                                    console.log('🎯 Processing SPA routing for current URL:', window.location.pathname);
                                    sessionStorage.removeItem('spa_needs_routing');
                                    
                                    // Give URL routing system time to initialize
                                    setTimeout(() => {
                                        if (window.urlRoutingSystem) {
                                            const page = window.urlRoutingSystem.getPageFromCurrentURL();
                                            if (page && page !== 'calculator' && typeof switchPage === 'function') {
                                                console.log('🔄 Switching to page from URL:', page);
                                                switchPage(page);
                                            }
                                        } else {
                                            console.warn('⚠️ URL routing system not available, trying direct page detection');
                                            // Fallback - try to detect page from URL manually
                                            const pathname = window.location.pathname;
                                            const pageFromPath = detectPageFromPath(pathname);
                                            if (pageFromPath && pageFromPath !== 'calculator' && typeof switchPage === 'function') {
                                                console.log('🔄 Fallback switching to page:', pageFromPath);
                                                switchPage(pageFromPath);
                                            }
                                        }
                                    }, 2000);
                                }
                                
                                // Fallback detection function
                                function detectPageFromPath(pathname) {
                                    const pathMappings = {
                                        '/app_settings/': 'settings',
                                        '/secret_pets/': 'secret',
                                        '/potions_food/': 'potions',
                                        '/worlds_info/': 'worlds',
                                        '/help_guide/': 'help',
                                        '/peoples_thanks/': 'peoples',
                                        '/arm_calculator/': 'arm',
                                        '/grind_calculator/': 'grind',
                                        '/boosts_info/': 'boosts',
                                        '/shiny_list/': 'shiny',
                                        '/codes_list/': 'codes',
                                        '/aura_info/': 'aura',
                                        '/trainer_info/': 'trainer',
                                        '/charms_info/': 'charms'
                                    };
                                    
                                    // Remove repository name from path if present
                                    let cleanPath = pathname;
                                    if (window.location.host.includes('.github.io')) {
                                        const segments = pathname.split('/').filter(s => s.length > 0);
                                        if (segments.length > 1) {
                                            cleanPath = '/' + segments.slice(1).join('/') + '/';
                                        }
                                    }
                                    
                                    return pathMappings[cleanPath] || 'calculator';
                                }
                            }, 3000);
                        };
                        document.head.appendChild(contentScript);
                    }
                };
                script.onerror = () => {
                    console.warn(`Failed to load script: ${src}`);
                    loadedCount++; // Still count as loaded to prevent hanging
                    if (loadedCount === totalScripts) {
                        const contentScript = document.createElement('script');
                        contentScript.src = 'index/content_loader.js';
                        contentScript.onload = () => {
                            updateLoadingText('Ready!');
                            
                            // Initialize systems even if some scripts failed
                            setTimeout(() => {
                                if (typeof initURLRouting === 'function') {
                                    initURLRouting();
                                }
                                
                                if (typeof initGitHubAutoReload === 'function') {
                                    const githubConfig = {
                                        githubUser: 'MAvpacheater',
                                        githubRepo: 'tester_site_Secret',
                                        branch: 'main',
                                        checkInterval: 30000
                                    };
                                    initGitHubAutoReload(githubConfig);
                                }
                                
                                // Handle SPA routing even if some scripts failed
                                const needsRouting = sessionStorage.getItem('spa_needs_routing');
                                if (needsRouting) {
                                    sessionStorage.removeItem('spa_needs_routing');
                                    setTimeout(() => {
                                        if (window.urlRoutingSystem) {
                                            const page = window.urlRoutingSystem.getPageFromCurrentURL();
                                            if (page && page !== 'calculator' && typeof switchPage === 'function') {
                                                switchPage(page);
                                            }
                                        }
                                    }, 1500);
                                }
                            }, 3000);
                        };
                        document.head.appendChild(contentScript);
                    }
                };
                document.head.appendChild(script);
            });
        }
        
        function updateLoadingText(text) {
            const subtitle = document.querySelector('.loading-subtitle');
            if (subtitle) subtitle.textContent = text;
        }
        
        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.remove(), 300);
            }
        }
        
        // Initialize loading process
        document.addEventListener('DOMContentLoaded', function() {
            updateLoadingText('Loading modules...');
            
            // Start loading scripts
            setTimeout(loadScriptsDeferred, 100);
            
            // Hide loading screen after content is ready
            setTimeout(() => {
                updateLoadingText('Ready!');
                setTimeout(hideLoadingScreen, 200);
            }, 1500);
        });

        // Error handling
        window.addEventListener('error', function(e) {
            console.error('Error:', e.error);
            
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.innerHTML = `
                    <div class="loading-content" style="color: #ff6b6b;">
                        <div style="font-size: 24px; margin-bottom: 20px;">⚠️</div>
                        <div>Loading Error</div>
                        <div style="font-size: 14px; margin-top: 10px;">Please refresh the page</div>
                        <button onclick="location.reload()" style="
                            margin-top: 15px;
                            padding: 8px 16px;
                            background: rgba(255, 255, 255, 0.2);
                            border: 1px solid rgba(255, 255, 255, 0.3);
                            color: white;
                            border-radius: 5px;
                            cursor: pointer;
                            font-size: 14px;
                        ">Refresh</button>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>

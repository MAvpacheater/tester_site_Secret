    <!-- Handle redirect from 404.html - Improved URL handling -->
    <script>
        (function() {
            console.log('🔍 Checking for URL restoration...');
            
            // Priority 1: Check for URL restoration from auto-reload
            const savedURLData = sessionStorage.getItem('urlBeforeReload');
            if (savedURLData) {
                try {
                    const urlData = JSON.parse(savedURLData);
                    const timeDiff = Date.now() - urlData.timestamp;
                    
                    if (timeDiff < 15000) { // Within 15 seconds
                        console.log('🔄 Auto-reload URL restoration detected:', urlData.fullURL);
                        
                        // Don't process 404 redirects when auto-reload is happening
                        if (sessionStorage.getItem('pathToRestore')) {
                            sessionStorage.removeItem('pathToRestore');
                            console.log('🗑️ Cleared pathToRestore due to auto-reload');
                        }
                        
                        // Let the reload system handle URL restoration
                        return;
                    }
                } catch (e) {
                    console.warn('⚠️ Invalid URL restore data, cleaning up');
                    sessionStorage.removeItem('urlBeforeReload');
                }
            }
            
            // Priority 2: Handle 404 redirect
            const redirect = sessionStorage.pathToRestore;
            if (redirect && redirect !== '/') {
                console.log('🔄 404 redirect restoration detected:', redirect);
                
                // Build the correct URL with base path
                const protocol = window.location.protocol;
                const host = window.location.host;
                let basePath = '';
                
                if (host.includes('.github.io') && host === 'mavpacheater.github.io') {
                    basePath = '/tester_site_Secret';
                }
                
                const fullPath = basePath + redirect;
                console.log('🎯 Full restored path:', fullPath);
                
                // Use replaceState to avoid history pollution
                history.replaceState(null, null, fullPath);
                
                // Clean up
                delete sessionStorage.pathToRestore;
            }
        })();
    </script>

<body>
    <!-- Loading screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-icon">🚀</div>
            <div>Loading Arm Helper...</div>
            <div class="loading-subtitle">Initializing...</div>
        </div>
    </div>

    <!-- Auto-reload indicator -->
    <div class="auto-reload-indicator" id="autoReloadIndicator">
        🔄 Auto-reload active
    </div>

    <!-- App content container -->
    <div id="app-content"></div>
    
    <!-- Signature -->
    <div class="signature">Your ideas on @privatefanat_dep (telegram)</div>
    
    <!-- Critical JavaScript -->
    <script src="system/general.js" defer></script>
    <script src="system/reload.js" defer></script>
    <script src="system/url.js" defer></script>
    
    <!-- Non-critical JavaScript loading -->
    <script>
        function createScript(src) {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = src;
                script.defer = true;
                script.onload = () => {
                    console.log(`✅ Script loaded: ${src}`);
                    resolve(src);
                };
                script.onerror = () => {
                    console.warn(`⚠️ Failed to load script: ${src}`);
                    resolve(src); // Resolve anyway to not block
                };
                document.head.appendChild(script);
            });
        }

        async function loadScriptsDeferred() {
            const scripts = [
                // Calculator modules
                'calc/calculator.js',
                'calc/arm.js', 
                'calc/grind.js',
                
                // Info modules
                'info/boosts.js',
                'info/shiny.js',
                'info/secret.js',
                'info/codes.js',
                'info/aura.js',
                'info/trainer.js',
                'info/charms.js',
                'info/potions.js',
                'info/worlds.js',
                
                // Moderation modules
                'moderation/settings.js',
                
                // Other modules
                'other/peoples.js',
                'other/help.js'
            ];
            
            console.log('🔄 Loading scripts...');
            updateLoadingText('Loading modules...');
            
            try {
                // Load all scripts in parallel
                await Promise.all(scripts.map(createScript));
                console.log('✅ All scripts loaded');
                
                // Load content loader
                await createScript('index/content_loader.js');
                console.log('✅ Content loader loaded');
                
                updateLoadingText('Ready!');
                
                // Initialize systems
                setTimeout(() => {
                    console.log('🚀 Initializing systems...');
                    initializeSystems();
                }, 500);
                
            } catch (error) {
                console.error('❌ Error loading scripts:', error);
                updateLoadingText('Loading completed with warnings');
                setTimeout(() => initializeSystems(), 1000);
            }
        }
        
        function initializeSystems() {
            try {
                // Initialize URL routing FIRST
                if (typeof initURLRouting === 'function') {
                    initURLRouting();
                    console.log('✅ URL routing initialized');
                }
                
                // Initialize GitHub auto-reload
                if (typeof initGitHubAutoReload === 'function') {
                    const githubConfig = {
                        githubUser: 'MAvpacheater',
                        githubRepo: 'tester_site_Secret',
                        branch: 'main',
                        checkInterval: 30000
                    };
                    initGitHubAutoReload(githubConfig);
                    console.log('✅ GitHub auto-reload initialized');
                }
                
                // Handle URL routing with improved coordination
                setTimeout(() => {
                    handleInitialRouting();
                }, 300); // Reduced delay for faster response
                
            } catch (error) {
                console.error('❌ Error initializing systems:', error);
            }
        }
        
        function handleInitialRouting() {
            console.log('🎯 Starting initial routing...');
            
            // Check if this is an auto-reload restoration
            const urlData = sessionStorage.getItem('urlBeforeReload');
            if (urlData) {
                console.log('🔄 Auto-reload detected, letting reload system handle routing');
                // Let the reload system handle this in handlePageRestoration
                return;
            }
            
            // Normal routing
            let targetPage = 'calculator'; // default
            
            if (typeof urlRouter === 'function') {
                const router = urlRouter();
                if (router) {
                    targetPage = router.getPageFromURL();
                    console.log(`🎯 Page from URL: ${targetPage}`);
                }
            } else {
                // Fallback manual parsing
                const currentPath = window.location.pathname;
                console.log(`🔍 Current path: ${currentPath}`);
                
                const pathMappings = {
                    '/settings/': 'settings',
                    '/secret_pets/': 'secret', 
                    '/potions_food/': 'potions',
                    '/worlds_info/': 'worlds',
                    '/help_guide/': 'help',
                    '/peoples_thanks/': 'peoples',
                    '/arm_calculator/': 'arm',
                    '/grind_calculator/': 'grind',
                    '/boosts_info/': 'boosts',
                    '/shiny_list/': 'shiny',
                    '/codes_list/': 'codes',
                    '/aura_info/': 'aura',
                    '/trainer_info/': 'trainer',
                    '/charms_info/': 'charms'
                };
                
                for (const [path, page] of Object.entries(pathMappings)) {
                    if (currentPath.includes(path)) {
                        console.log(`🎯 Found page match: ${path} -> ${page}`);
                        targetPage = page;
                        break;
                    }
                }
            }
            
            // Switch to the target page
            if (typeof switchPage === 'function') {
                console.log(`🔀 Switching to initial page: ${targetPage}`);
                switchPage(targetPage);
            }
        }
        
        function updateLoadingText(text) {
            const subtitle = document.querySelector('.loading-subtitle');
            if (subtitle) subtitle.textContent = text;
        }
        
        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    if (loadingScreen.parentNode) {
                        loadingScreen.remove();
                    }
                }, 300);
            }
        }
        
        // Initialize loading process
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM Content Loaded');
            
            // Wait for critical scripts
            let attempts = 0;
            const maxAttempts = 50;
            
            function waitForCriticalScripts() {
                if (typeof initializeApp === 'function' || attempts >= maxAttempts) {
                    console.log('🔄 Starting script loading...');
                    loadScriptsDeferred();
                    
                    // Hide loading screen
                    setTimeout(() => {
                        updateLoadingText('Ready!');
                        setTimeout(hideLoadingScreen, 500);
                    }, 3000);
                } else {
                    attempts++;
                    setTimeout(waitForCriticalScripts, 100);
                }
            }
            
            waitForCriticalScripts();
        });

        // Error handling
        window.addEventListener('error', function(e) {
            console.error('❌ JavaScript Error:', e.error);
        });
        
        // Enhanced beforeunload handler to save current state for manual refreshes
        window.addEventListener('beforeunload', function() {
            // Only save for manual refresh, not auto-reload
            if (!sessionStorage.getItem('urlBeforeReload')) {
                const currentURL = window.location.href;
                const currentPathname = window.location.pathname;
                const currentSearch = window.location.search;
                const currentHash = window.location.hash;
                
                const urlData = {
                    fullURL: currentURL,
                    pathname: currentPathname,
                    search: currentSearch,
                    hash: currentHash,
                    timestamp: Date.now(),
                    type: 'manual'
                };
                
                sessionStorage.setItem('manualRefreshURL', JSON.stringify(urlData));
                console.log('💾 Saved URL for manual refresh:', urlData);
            }
        });
        
        // Debug function
        window.checkLoadedModules = function() {
            console.log('=== LOADED MODULES CHECK ===');
            console.log('initializeApp:', typeof initializeApp);
            console.log('switchPage:', typeof switchPage);
            console.log('initURLRouting:', typeof initURLRouting);
            console.log('initGitHubAutoReload:', typeof initGitHubAutoReload);
            console.log('App content element:', document.getElementById('app-content') ? 'Found' : 'Missing');
            console.log('URL Router:', typeof urlRouter === 'function' ? urlRouter() : 'Not available');
            console.log('=========================');
        };
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arm Helper</title>
    
    <!-- Simple SPA redirect handler -->
    <script>
        // Handle redirect from 404.html
        (function() {
            var redirect = sessionStorage.pathToRestore;
            delete sessionStorage.pathToRestore;
            
            if (redirect && redirect !== location.pathname) {
                console.log('🔄 Restoring path from 404:', redirect);
                history.replaceState(null, null, redirect);
            }
        })();
    </script>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="system/general.css" as="style">
    <link rel="preload" href="system/general.js" as="script">
    
    <!-- Critical CSS - load immediately -->
    <link rel="stylesheet" href="system/general.css">
    
    <!-- Non-critical CSS - load deferred -->
    <link rel="stylesheet" href="calc/calculator.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="calc/arms.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="calc/grind.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/boosts.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/shiny.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/secret.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/codes.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/aura.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/trainer.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/charms.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/potions.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/worlds.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="moderation/settings.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="other/peoples.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="other/help.css" media="print" onload="this.media='all'">
</head>
<body>
    <!-- Loading screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-icon">🚀</div>
            <div>Loading Arm Helper...</div>
            <div class="loading-subtitle">Initializing...</div>
        </div>
    </div>

    <!-- Auto-reload indicator -->
    <div class="auto-reload-indicator" id="autoReloadIndicator">
        🔄 GitHub Auto-reload active
    </div>

    <!-- App content container -->
    <div id="app-content"></div>
    
    <!-- Signature -->
    <div class="signature">Your ideas on @privatefanat_dep (telegram)</div>
    
    <!-- Critical JavaScript - load immediately -->
    <script src="system/general.js"></script>
    <script src="system/reload.js"></script>
    <script src="system/url.js"></script>
    
    <!-- Non-critical JavaScript - load deferred -->
    <script>
        // Deferred script loading function
        function loadScriptsDeferred() {
            const scripts = [
                // Calculator modules
                'calc/calculator.js',
                'calc/arm.js', 
                'calc/grind.js',
                
                // Info modules
                'info/boosts.js',
                'info/shiny.js',
                'info/secret.js',
                'info/codes.js',
                'info/aura.js',
                'info/trainer.js',
                'info/charms.js',
                'info/potions.js',
                'info/worlds.js',
                
                // Moderation modules
                'moderation/settings.js',
                
                // Other modules
                'other/peoples.js',
                'other/help.js'
            ];
            
            let loadedCount = 0;
            const totalScripts = scripts.length;
            
            scripts.forEach(src => {
                const script = document.createElement('script');
                script.src = src;
                script.defer = true;
                script.onload = () => {
                    loadedCount++;
                    console.log(`✅ Script loaded: ${src} (${loadedCount}/${totalScripts})`);
                    
                    if (loadedCount === totalScripts) {
                        // All scripts loaded, now load content
                        console.log('🎯 All scripts loaded, loading content...');
                        const contentScript = document.createElement('script');
                        contentScript.src = 'index/content_loader.js';
                        contentScript.onload = () => {
                            console.log('✅ Content loader loaded');
                            updateLoadingText('Ready!');
                            
                            // Initialize systems after everything is loaded
                            setTimeout(() => {
                                console.log('🚀 Initializing systems...');
                                
                                // Initialize URL routing first
                                if (typeof initURLRouting === 'function') {
                                    try {
                                        initURLRouting();
                                        console.log('✅ URL routing initialized');
                                    } catch (e) {
                                        console.warn('⚠️ URL routing failed:', e);
                                    }
                                }
                                
                                // Then initialize GitHub auto-reload
                                if (typeof initGitHubAutoReload === 'function') {
                                    try {
                                        const githubConfig = {
                                            githubUser: 'MAvpacheater',
                                            githubRepo: 'tester_site_Secret',
                                            branch: 'main',
                                            checkInterval: 30000
                                        };
                                        initGitHubAutoReload(githubConfig);
                                        console.log('✅ GitHub auto-reload initialized');
                                    } catch (e) {
                                        console.warn('⚠️ GitHub auto-reload failed:', e);
                                    }
                                }
                                
                                // Handle URL routing for redirected pages
                                setTimeout(() => {
                                    const currentPath = window.location.pathname;
                                    console.log('🔍 Checking current path for routing:', currentPath);
                                    
                                    // Simple path-to-page mapping
                                    const pathMappings = {
                                        '/app_settings/': 'settings',
                                        '/secret_pets/': 'secret', 
                                        '/potions_food/': 'potions',
                                        '/worlds_info/': 'worlds',
                                        '/help_guide/': 'help',
                                        '/peoples_thanks/': 'peoples',
                                        '/arm_calculator/': 'arm',
                                        '/grind_calculator/': 'grind',
                                        '/boosts_info/': 'boosts',
                                        '/shiny_list/': 'shiny',
                                        '/codes_list/': 'codes',
                                        '/aura_info/': 'aura',
                                        '/trainer_info/': 'trainer',
                                        '/charms_info/': 'charms'
                                    };
                                    
                                    // Check if current path matches any page
                                    for (const [path, page] of Object.entries(pathMappings)) {
                                        if (currentPath.includes(path)) {
                                            console.log(`🎯 Found page match: ${path} -> ${page}`);
                                            if (typeof switchPage === 'function') {
                                                setTimeout(() => {
                                                    switchPage(page);
                                                    console.log(`✅ Switched to page: ${page}`);
                                                }, 1000);
                                            }
                                            break;
                                        }
                                    }
                                }, 1000);
                                
                            }, 2000);
                        };
                        contentScript.onerror = () => {
                            console.error('❌ Failed to load content_loader.js');
                            updateLoadingText('Error loading content');
                        };
                        document.head.appendChild(contentScript);
                    }
                };
                script.onerror = () => {
                    console.warn(`⚠️ Failed to load script: ${src}`);
                    loadedCount++; // Still count as loaded to prevent hanging
                    
                    if (loadedCount === totalScripts) {
                        // Even if some scripts failed, try to load content
                        const contentScript = document.createElement('script');
                        contentScript.src = 'index/content_loader.js';
                        contentScript.onload = () => {
                            updateLoadingText('Ready!');
                            
                            setTimeout(() => {
                                console.log('🚀 Initializing systems (with some script failures)...');
                                
                                // Try to initialize what we can
                                if (typeof initURLRouting === 'function') {
                                    try { initURLRouting(); } catch (e) { console.warn('URL routing failed:', e); }
                                }
                                
                                if (typeof initGitHubAutoReload === 'function') {
                                    try {
                                        const githubConfig = {
                                            githubUser: 'MAvpacheater',
                                            githubRepo: 'tester_site_Secret',
                                            branch: 'main',
                                            checkInterval: 30000
                                        };
                                        initGitHubAutoReload(githubConfig);
                                    } catch (e) { console.warn('GitHub auto-reload failed:', e); }
                                }
                            }, 2000);
                        };
                        document.head.appendChild(contentScript);
                    }
                };
                document.head.appendChild(script);
            });
        }
        
        function updateLoadingText(text) {
            const subtitle = document.querySelector('.loading-subtitle');
            if (subtitle) subtitle.textContent = text;
        }
        
        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    if (loadingScreen.parentNode) {
                        loadingScreen.remove();
                    }
                }, 300);
            }
        }
        
        // Initialize loading process
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM Content Loaded');
            updateLoadingText('Loading modules...');
            
            // Start loading scripts
            setTimeout(() => {
                console.log('🔄 Starting script loading...');
                loadScriptsDeferred();
            }, 100);
            
            // Hide loading screen after content is ready
            setTimeout(() => {
                updateLoadingText('Ready!');
                setTimeout(hideLoadingScreen, 500);
            }, 6000); // Increased timeout to ensure everything loads
        });

        // Error handling
        window.addEventListener('error', function(e) {
            console.error('❌ JavaScript Error:', e.error);
            
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.innerHTML = `
                    <div class="loading-content" style="color: #ff6b6b;">
                        <div style="font-size: 24px; margin-bottom: 20px;">⚠️</div>
                        <div>Loading Error</div>
                        <div style="font-size: 14px; margin-top: 10px;">JavaScript failed to load</div>
                        <button onclick="location.reload()" style="
                            margin-top: 15px;
                            padding: 8px 16px;
                            background: rgba(255, 255, 255, 0.2);
                            border: 1px solid rgba(255, 255, 255, 0.3);
                            color: white;
                            border-radius: 5px;
                            cursor: pointer;
                            font-size: 14px;
                        ">Refresh Page</button>
                        <div style="font-size: 10px; margin-top: 10px; opacity: 0.7;">Error: ${e.error ? e.error.message : 'Unknown error'}</div>
                    </div>
                `;
            }
        });
        
        // Debug function to check what's loaded
        window.checkLoadedModules = function() {
            console.log('=== LOADED MODULES CHECK ===');
            console.log('initializeApp:', typeof initializeApp);
            console.log('switchPage:', typeof switchPage);
            console.log('initURLRouting:', typeof initURLRouting);
            console.log('initGitHubAutoReload:', typeof initGitHubAutoReload);
            console.log('App content element:', document.getElementById('app-content') ? 'Found' : 'Missing');
            console.log('=========================');
        };
    </script>
</body>
</html>

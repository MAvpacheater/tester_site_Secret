<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arm Helper</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="general.css" as="style">
    <link rel="preload" href="general_menu.css" as="style">
    <link rel="preload" href="general.js" as="script">
    
    <!-- Critical CSS - load immediately -->
    <link rel="stylesheet" href="general.css">
    <link rel="stylesheet" href="general_menu.css">
    
    <!-- Non-critical CSS - load deferred -->
    <link rel="stylesheet" href="calc/calculator.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="calc/arms.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="calc/grind.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/boosts.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/shiny.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/secret.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/codes.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/aura.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/trainer.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/charms.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/potions.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="info/worlds.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="moderation/settings.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="other/updates.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="other/peoples.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="other/help.css" media="print" onload="this.media='all'">
</head>
<body>
    <!-- Loading screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-icon">🚀</div>
            <div>Loading Arm Helper...</div>
            <div class="loading-subtitle">Initializing...</div>
        </div>
    </div>

    <!-- Auto-reload indicator -->
    <div class="auto-reload-indicator" id="autoReloadIndicator">
        🔄 Auto-reload active
    </div>

    <!-- App content container -->
    <div id="app-content"></div>
    
    <!-- Signature -->
    <div class="signature">Your ideas on @privatefanat_dep (telegram)</div>
    
    <!-- Critical JavaScript - load immediately -->
    <script src="general.js"></script>
    <script src="reload.js"></script>
    
    <!-- Debug menu functionality -->
    <script>
        // Debug and fix menu functionality
        console.log('🔧 Debug: Checking menu functions...');
        
        // Ensure all menu functions are available
        document.addEventListener('DOMContentLoaded', function() {
            
            // Debug function availability
            const requiredFunctions = [
                'switchPage',
                'toggleMobileMenu', 
                'closeSidebar',
                'toggleCategory',
                'switchAppLanguage',
                'handleAuthAction'
            ];
            
            setTimeout(() => {
                console.log('🔍 Checking function availability:');
                requiredFunctions.forEach(funcName => {
                    if (typeof window[funcName] === 'function') {
                        console.log(`✅ ${funcName} - Available`);
                    } else {
                        console.error(`❌ ${funcName} - Missing!`);
                        
                        // Provide fallback functions
                        switch(funcName) {
                            case 'switchPage':
                                window.switchPage = function(page) {
                                    console.log('Fallback switchPage:', page);
                                    // Basic page switching logic
                                    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
                                    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
                                    
                                    const targetPage = document.getElementById(page + 'Page');
                                    if (targetPage) {
                                        targetPage.classList.add('active');
                                    }
                                    
                                    const targetButton = document.querySelector(`[data-page="${page}"]`);
                                    if (targetButton) {
                                        targetButton.classList.add('active');
                                    }
                                    
                                    if (typeof window.closeSidebar === 'function') {
                                        window.closeSidebar();
                                    }
                                };
                                break;
                            case 'toggleMobileMenu':
                                window.toggleMobileMenu = function() {
                                    console.log('Fallback toggleMobileMenu');
                                    const sidebar = document.getElementById('sidebar');
                                    const overlay = document.getElementById('sidebarOverlay');
                                    
                                    if (sidebar && overlay) {
                                        sidebar.classList.toggle('open');
                                        overlay.classList.toggle('show');
                                    }
                                };
                                break;
                            case 'closeSidebar':
                                window.closeSidebar = function() {
                                    console.log('Fallback closeSidebar');
                                    const sidebar = document.getElementById('sidebar');
                                    const overlay = document.getElementById('sidebarOverlay');
                                    
                                    if (sidebar && overlay) {
                                        sidebar.classList.remove('open');
                                        overlay.classList.remove('show');
                                    }
                                };
                                break;
                            case 'toggleCategory':
                                window.toggleCategory = function(categoryId) {
                                    console.log('Fallback toggleCategory:', categoryId);
                                    const categoryButtons = document.getElementById(categoryId);
                                    const toggleIcon = document.querySelector(`[data-category="${categoryId}"] .category-toggle`);
                                    
                                    if (categoryButtons && toggleIcon) {
                                        const isExpanded = categoryButtons.classList.contains('expanded');
                                        
                                        // Close all categories first
                                        document.querySelectorAll('.category-buttons').forEach(el => {
                                            el.classList.remove('expanded');
                                        });
                                        document.querySelectorAll('.category-toggle').forEach(el => {
                                            el.classList.remove('expanded');
                                        });
                                        
                                        // If this category wasn't expanded, expand it
                                        if (!isExpanded) {
                                            categoryButtons.classList.add('expanded');
                                            toggleIcon.classList.add('expanded');
                                        }
                                    }
                                };
                                break;
                            case 'switchAppLanguage':
                                window.switchAppLanguage = function(lang) {
                                    console.log('Fallback switchAppLanguage:', lang);
                                    // Update flag buttons
                                    document.querySelectorAll('.lang-flag-btn').forEach(btn => {
                                        btn.classList.remove('active');
                                        if (btn.dataset.lang === lang) {
                                            btn.classList.add('active');
                                        }
                                    });
                                };
                                break;
                            case 'handleAuthAction':
                                window.handleAuthAction = function() {
                                    console.log('Fallback handleAuthAction');
                                    const authBtn = document.getElementById('authButton');
                                    if (authBtn) {
                                        const originalText = authBtn.textContent;
                                        authBtn.textContent = '🔒 Coming Soon!';
                                        authBtn.style.transform = 'scale(0.95)';
                                        
                                        setTimeout(() => {
                                            authBtn.textContent = originalText;
                                            authBtn.style.transform = 'scale(1)';
                                        }, 1000);
                                    }
                                };
                                break;
                        }
                        console.log(`🔧 Fallback function created for ${funcName}`);
                    }
                });
                
            }, 1000);
        });
    </script>
    
    <!-- Non-critical JavaScript - load deferred -->
    <script>
        // Deferred script loading function
        function loadScriptsDeferred() {
            const scripts = [
                // Calculator modules
                'calc/calculator.js',
                'calc/arm.js', 
                'calc/grind.js',
                
                // Info modules
                'info/boosts.js',
                'info/shiny.js',
                'info/secret.js',
                'info/codes.js',
                'info/aura.js',
                'info/trainer.js',
                'info/charms.js',
                'info/potions.js',
                'info/worlds.js',
                
                // Moderation modules
                'moderation/settings.js',
                
                // Other modules
                'other/updates.js',
                'other/peoples.js',
                'other/help.js'
            ];
            
            let loadedCount = 0;
            const totalScripts = scripts.length;
            
            scripts.forEach(src => {
                const script = document.createElement('script');
                script.src = src;
                script.defer = true;
                script.onload = () => {
                    loadedCount++;
                    if (loadedCount === totalScripts) {
                        // All scripts loaded, now load content
                        const contentScript = document.createElement('script');
                        contentScript.src = 'index/content_loader.js';
                        contentScript.onload = () => {
                            updateLoadingText('Ready!');
                            // Initialize auto-reload after everything is loaded
                            setTimeout(() => {
                                if (typeof initAutoReload === 'function') {
                                    initAutoReload();
                                }
                            }, 2000);
                        };
                        document.head.appendChild(contentScript);
                    }
                };
                script.onerror = () => {
                    console.warn(`Failed to load script: ${src}`);
                    loadedCount++; // Still count as loaded to prevent hanging
                    if (loadedCount === totalScripts) {
                        const contentScript = document.createElement('script');
                        contentScript.src = 'index/content_loader.js';
                        contentScript.onload = () => updateLoadingText('Ready!');
                        document.head.appendChild(contentScript);
                    }
                };
                document.head.appendChild(script);
            });
        }
        
        function updateLoadingText(text) {
            const subtitle = document.querySelector('.loading-subtitle');
            if (subtitle) subtitle.textContent = text;
        }
        
        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.remove(), 300);
            }
        }
        
        // Initialize loading process
        document.addEventListener('DOMContentLoaded', function() {
            updateLoadingText('Loading modules...');
            
            // Start loading scripts
            setTimeout(loadScriptsDeferred, 100);
            
            // Hide loading screen after content is ready
            setTimeout(() => {
                updateLoadingText('Ready!');
                setTimeout(hideLoadingScreen, 200);
            }, 1500);
        });

        // Error handling
        window.addEventListener('error', function(e) {
            console.error('Error:', e.error);
            
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.innerHTML = `
                    <div class="loading-content" style="color: #ff6b6b;">
                        <div style="font-size: 24px; margin-bottom: 20px;">⚠️</div>
                        <div>Loading Error</div>
                        <div style="font-size: 14px; margin-top: 10px;">Please refresh the page</div>
                        <button onclick="location.reload()" style="
                            margin-top: 15px;
                            padding: 8px 16px;
                            background: rgba(255, 255, 255, 0.2);
                            border: 1px solid rgba(255, 255, 255, 0.3);
                            color: white;
                            border-radius: 5px;
                            cursor: pointer;
                            font-size: 14px;
                        ">Refresh</button>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>

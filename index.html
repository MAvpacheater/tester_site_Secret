<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arm Helper</title>
    
    <!-- Handle redirect from 404.html -->
    <script>
        (function() {
            var redirect = sessionStorage.pathToRestore;
            delete sessionStorage.pathToRestore;
            
            if (redirect && redirect !== location.pathname) {
                console.log('🔄 Restoring path from 404:', redirect);
                history.replaceState(null, null, redirect);
            }
        })();
    </script>
    
    <!-- Critical CSS -->
    <link rel="stylesheet" href="system/general.css">
</head>
<body>
    <!-- Loading screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-icon">🚀</div>
            <div>Loading Arm Helper...</div>
            <div class="loading-subtitle">Initializing...</div>
        </div>
    </div>

    <!-- Auto-reload indicator -->
    <div class="auto-reload-indicator" id="autoReloadIndicator">
        🔄 Auto-reload active
    </div>

    <!-- App content container -->
    <div id="app-content"></div>
    
    <!-- Signature -->
    <div class="signature">Your ideas on @privatefanat_dep (telegram)</div>
    
    <!-- Critical JavaScript -->
    <script src="system/general.js"></script>
    <script src="system/reload.js"></script>
    <script src="system/url.js"></script>
    
    <!-- Load content after critical systems -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM Content Loaded');
            
            // Load content first
            fetch('index/content_loader.js')
                .then(response => response.text())
                .then(script => {
                    const scriptElement = document.createElement('script');
                    scriptElement.textContent = script;
                    document.head.appendChild(scriptElement);
                    console.log('✅ Content loader executed');
                    
                    // Wait for content to load then initialize
                    setTimeout(initializeAll, 1000);
                })
                .catch(error => {
                    console.error('❌ Failed to load content:', error);
                    document.getElementById('app-content').innerHTML = '<div class="container"><h1>Failed to load content</h1></div>';
                });
        });

        function initializeAll() {
            console.log('🚀 Initializing all systems...');
            
            // Initialize URL routing
            if (typeof initURLRouting === 'function') {
                initURLRouting();
            }
            
            // Initialize GitHub auto-reload
            if (typeof initGitHubAutoReload === 'function') {
                initGitHubAutoReload({
                    githubUser: 'MAvpacheater',
                    githubRepo: 'tester_site_Secret',
                    branch: 'main',
                    checkInterval: 30000
                });
            }
            
            // Initialize app
            setTimeout(() => {
                if (typeof initializeApp === 'function') {
                    initializeApp();
                }
            }, 500);
            
            // Hide loading screen
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => loadingScreen.remove(), 300);
                }
            }, 2000);
        }

        // Error handling
        window.addEventListener('error', function(e) {
            console.error('❌ JavaScript Error:', e.error);
        });
    </script>
</body>
</html>
